name: call-center-app

services:
  mysql:
    image: mysql:8.4.10
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-call_center_app}
      MYSQL_USER: ${MYSQL_USER:-call_center}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  api:
    image: call-center-api:local
    build:
      context: .
      dockerfile: server/Dockerfile
      target: runtime
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment: &api-environment
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-call_center}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
      DB_NAME: ${MYSQL_DATABASE:-call_center_app}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET must be set}
      TRUST_PROXY: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: call-center-web:local
    build:
      context: .
      dockerfile: client/Dockerfile
      target: runtime
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy

  setup:
    image: call-center-api:local
    profiles: ["tools"]
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["node", "dist/setup.js"]
    environment:
      <<: *api-environment
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}
      SUPER_ADMIN_FULL_NAME: ${SUPER_ADMIN_FULL_NAME:-Süper Admin}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@example.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?SUPER_ADMIN_PASSWORD must be set}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
